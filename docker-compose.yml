version: "3.9"

services:
  # ── Neo4j ─────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: ba_neo4j
    ports:
      - "7474:7474"   # Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password123", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── ChromaDB ──────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.4.24
    container_name: ba_chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI 백엔드 ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ba_api
    ports:
      - "8080:8080"
    depends_on:
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      CHROMA_PERSIST_DIR: /app/data/chroma
    volumes:
      - ./data:/app/data
    env_file:
      - .env

  # ── Streamlit UI ───────────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: ba_ui
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    volumes:
      - ./data:/app/data
    env_file:
      - .env

volumes:
  neo4j_data:
  neo4j_logs:
  chroma_data:
